name: Build Windows EXE (onefile)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyside6 pandas openpyxl pyinstaller

      - name: Build EXE (onefile, windowed)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name ProjectorTool `
            --collect-all PySide6 `
            --collect-all shiboken6 `
            projector_tool_app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectorTool-windows-onefile
          path: dist/ProjectorTool.exe
